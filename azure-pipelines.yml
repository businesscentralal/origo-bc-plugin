# Azure Pipelines build definition for the origo-bc Cowork plugin.
#
# Trigger: every push to main — the pipeline validates the plugin source,
# packages it as `origo-bc.plugin`, and publishes the bundle as a pipeline
# artifact so anyone with pipeline-read access can download it.
#
# Conventions used:
#   - ubuntu-latest agent (Node 20 is preinstalled, zip is available)
#   - plugin source tree lives under plugins/origo-bc
#   - build output goes to $(Build.ArtifactStagingDirectory)/origo-bc.plugin
#   - the pipeline reads the semver from plugins/origo-bc/.claude-plugin/plugin.json
#     so the run name matches the version being shipped

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - plugins/**
      - scripts/**
      - .claude-plugin/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - plugins/**
      - scripts/**
      - .claude-plugin/**
      - docs/**
      - azure-pipelines.yml

pool:
  vmImage: ubuntu-latest

variables:
  # The "CI Build Agent" variable group is maintained in Azure DevOps
  # (Pipelines → Library). It provides:
  #   - StorageBaseURL   e.g. https://origopublic.blob.core.windows.net/
  #   - StorageSasToken  container-scoped SAS for the `resources` container
  # These are used by the release step below to publish the built plugin
  # to a stable public URL. DO NOT hardcode these values here.
  - group: 'CI Build Agent'
  - name: PLUGIN_DIR
    value: plugins/origo-bc
  - name: STAGING_DIR
    value: $(Build.ArtifactStagingDirectory)
  # Destination path inside the blob container. Kept as a variable so we
  # can re-point later (e.g. from `mcp/` to `mcp/stable/`) without touching
  # every step.
  - name: BLOB_CONTAINER
    value: resources
  - name: BLOB_PREFIX
    value: mcp

# Pretty run name that includes both the plugin semver and the commit SHA
name: $(Date:yyyyMMdd).$(Rev:r)_$(Build.SourceVersion)

steps:
  - checkout: self
    fetchDepth: '1'
    displayName: Checkout repository

  - task: NodeTool@0
    displayName: Use Node 20
    inputs:
      versionSpec: '20.x'

  - bash: |
      set -euo pipefail
      echo "Node: $(node --version)"
      echo "Zip : $(zip --version | head -1)"
      jq --version
    displayName: Tool versions

  - bash: |
      set -euo pipefail
      bash scripts/validate-plugin.sh "$(PLUGIN_DIR)"
    displayName: Validate plugin source

  - bash: |
      set -euo pipefail
      bash scripts/build-plugin.sh "$(PLUGIN_DIR)" "$(STAGING_DIR)"
    displayName: Build origo-bc.plugin

  - bash: |
      set -euo pipefail
      VERSION=$(jq -r .version "$(PLUGIN_DIR)/.claude-plugin/plugin.json")
      echo "##vso[build.updatebuildnumber]origo-bc $VERSION + $(Build.SourceBranchName) $(Build.SourceVersion)"
      echo "Produced origo-bc.plugin for version $VERSION"
      ls -la "$(STAGING_DIR)"
    displayName: Annotate run with plugin version

  - publish: $(STAGING_DIR)
    displayName: Publish origo-bc.plugin artifact
    artifact: origo-bc-plugin

  # ---------------------------------------------------------------------
  # Release step — upload to public blob storage
  #
  # Uploads the built plugin to
  #   $(StorageBaseURL)$(BLOB_CONTAINER)/$(BLOB_PREFIX)/origo-bc.plugin
  # (the "latest" copy — always overwritten) AND
  #   $(StorageBaseURL)$(BLOB_CONTAINER)/$(BLOB_PREFIX)/origo-bc-<version>.plugin
  # (a versioned, immutable copy for reference).
  #
  # Only runs on pushes to `main`, never on PR builds, and only if the
  # build step succeeded. Auth is via the container-scoped SAS token in
  # the "CI Build Agent" variable group.
  # ---------------------------------------------------------------------
  - bash: |
      set -euo pipefail

      VERSION=$(jq -r .version "$(PLUGIN_DIR)/.claude-plugin/plugin.json")
      PLUGIN_FILE="$(STAGING_DIR)/origo-bc.plugin"

      if [[ ! -f "$PLUGIN_FILE" ]]; then
        echo "ERROR: $PLUGIN_FILE not found" >&2
        exit 1
      fi

      # Strip trailing slash off the base URL if present, so we can
      # concatenate safely.
      BASE="${STORAGE_BASE_URL%/}"
      CONTAINER="$(BLOB_CONTAINER)"
      PREFIX="$(BLOB_PREFIX)"

      LATEST_URL="$BASE/$CONTAINER/$PREFIX/origo-bc.plugin"
      VERSIONED_URL="$BASE/$CONTAINER/$PREFIX/origo-bc-$VERSION.plugin"

      echo "Uploading $PLUGIN_FILE"
      echo "  -> $LATEST_URL     (overwrite)"
      echo "  -> $VERSIONED_URL  (immutable)"

      # Azure CLI is preinstalled on ubuntu-latest agents.
      # Account name is derived from the host part of StorageBaseURL so
      # we don't need to duplicate it in the variable group.
      ACCOUNT=$(echo "$BASE" | sed -E 's#https?://([^.]+)\..*#\1#')
      echo "  account: $ACCOUNT"

      # Latest (overwrite allowed)
      az storage blob upload \
        --account-name "$ACCOUNT" \
        --container-name "$CONTAINER" \
        --name "$PREFIX/origo-bc.plugin" \
        --file "$PLUGIN_FILE" \
        --sas-token "$STORAGE_SAS_TOKEN" \
        --overwrite true \
        --content-type "application/zip" \
        --only-show-errors

      # Versioned (fail if it already exists — we never rewrite a release)
      if az storage blob upload \
          --account-name "$ACCOUNT" \
          --container-name "$CONTAINER" \
          --name "$PREFIX/origo-bc-$VERSION.plugin" \
          --file "$PLUGIN_FILE" \
          --sas-token "$STORAGE_SAS_TOKEN" \
          --content-type "application/zip" \
          --only-show-errors 2>/tmp/az.err; then
        echo "Uploaded versioned copy."
      else
        if grep -q "BlobAlreadyExists" /tmp/az.err; then
          echo "NOTE: origo-bc-$VERSION.plugin already exists in blob storage."
          echo "      Bump the version in plugin.json to publish a new release."
        else
          cat /tmp/az.err >&2
          exit 1
        fi
      fi

      echo ""
      echo "Done. Stable download URLs:"
      echo "  Latest   : $LATEST_URL"
      echo "  Versioned: $VERSIONED_URL"
    env:
      # Map variable-group secrets into the step's environment so the
      # SAS token doesn't end up in command lines / build logs.
      STORAGE_BASE_URL: $(StorageBaseURL)
      STORAGE_SAS_TOKEN: $(StorageSasToken)
    displayName: Release origo-bc.plugin to public blob
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  # ---------------------------------------------------------------------
  # Upload the marketplace manifest and the plugin source tree so the
  # blob doubles as a Claude Code plugin marketplace. Consumers can then
  # add it with a single command:
  #
  #   claude plugin marketplace add https://origopublic.blob.core.windows.net/resources/mcp
  #   claude plugin install origo-bc@origo
  #
  # The `.plugin` file above still exists for manual drag-and-drop
  # installs (Cowork path). This step is purely additive.
  # ---------------------------------------------------------------------
  - bash: |
      set -euo pipefail

      BASE="${STORAGE_BASE_URL%/}"
      CONTAINER="$(BLOB_CONTAINER)"
      PREFIX="$(BLOB_PREFIX)"
      ACCOUNT=$(echo "$BASE" | sed -E 's#https?://([^.]+)\..*#\1#')

      MARKETPLACE_URL="$BASE/$CONTAINER/$PREFIX/.claude-plugin/marketplace.json"
      MARKETPLACE_ROOT="$BASE/$CONTAINER/$PREFIX"

      echo "Uploading blob-hosted marketplace..."
      echo "  root file: $MARKETPLACE_URL"

      # Marketplace manifest (small, served with a short cache so updates
      # propagate quickly).
      az storage blob upload \
        --account-name "$ACCOUNT" \
        --container-name "$CONTAINER" \
        --name "$PREFIX/.claude-plugin/marketplace.json" \
        --file ".claude-plugin/marketplace.json" \
        --sas-token "$STORAGE_SAS_TOKEN" \
        --overwrite true \
        --content-type "application/json; charset=utf-8" \
        --content-cache-control "public, max-age=300" \
        --only-show-errors

      # Plugin source tree — Claude Code walks this relative to the
      # marketplace.json location when it resolves `source: "./plugins/origo-bc"`.
      echo "  source tree: $BASE/$CONTAINER/$PREFIX/plugins/origo-bc/**"
      az storage blob upload-batch \
        --account-name "$ACCOUNT" \
        --destination "$CONTAINER" \
        --destination-path "$PREFIX/plugins/origo-bc" \
        --source "plugins/origo-bc" \
        --sas-token "$STORAGE_SAS_TOKEN" \
        --overwrite \
        --only-show-errors

      echo ""
      echo "Done. Marketplace root: $MARKETPLACE_ROOT"
      echo ""
      echo "Consumers can add with:"
      echo "  claude plugin marketplace add $MARKETPLACE_ROOT"
      echo "  claude plugin install origo-bc@origo"
    env:
      STORAGE_BASE_URL: $(StorageBaseURL)
      STORAGE_SAS_TOKEN: $(StorageSasToken)
    displayName: Upload marketplace + plugin source to blob
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  # ---------------------------------------------------------------------
  # Upload bilingual install guide (docs/install.html) to the same blob
  # path. Rendered directly in the browser at
  #   https://origopublic.blob.core.windows.net/resources/mcp/install.html
  # Always overwritten on each build so content stays in sync with the
  # repo.
  # ---------------------------------------------------------------------
  - bash: |
      set -euo pipefail

      DOC_FILE="docs/install.html"
      if [[ ! -f "$DOC_FILE" ]]; then
        echo "ERROR: $DOC_FILE not found" >&2
        exit 1
      fi

      BASE="${STORAGE_BASE_URL%/}"
      CONTAINER="$(BLOB_CONTAINER)"
      PREFIX="$(BLOB_PREFIX)"
      ACCOUNT=$(echo "$BASE" | sed -E 's#https?://([^.]+)\..*#\1#')
      TARGET_URL="$BASE/$CONTAINER/$PREFIX/install.html"

      echo "Uploading $DOC_FILE"
      echo "  -> $TARGET_URL"

      az storage blob upload \
        --account-name "$ACCOUNT" \
        --container-name "$CONTAINER" \
        --name "$PREFIX/install.html" \
        --file "$DOC_FILE" \
        --sas-token "$STORAGE_SAS_TOKEN" \
        --overwrite true \
        --content-type "text/html; charset=utf-8" \
        --content-cache-control "public, max-age=300" \
        --only-show-errors

      echo ""
      echo "Install guide URL: $TARGET_URL"
    env:
      STORAGE_BASE_URL: $(StorageBaseURL)
      STORAGE_SAS_TOKEN: $(StorageSasToken)
    displayName: Upload install guide to public blob
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
